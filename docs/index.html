<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteQ8 Security Tools</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
:root{
  --ink:#050608;--ink1:#08090d;--ink2:#0c0f16;--ink3:#10141e;--ink4:#151b28;
  --line:#1c2336;--line2:#252f47;--ghost:#2e3d5a;--muted:#4a5e80;
  --mid:#6b80a8;--body:#98aac8;--hi:#dce8f8;--white:#f0f6ff;
  --azure:#3d9bff;--ag:rgba(61,155,255,.26);--ad:rgba(61,155,255,.06);
  --scarlet:#ff3d5a;--sg:rgba(255,61,90,.26);--sd:rgba(255,61,90,.06);
  --jade:#00e8a2;--jg:rgba(0,232,162,.26);--jd:rgba(0,232,162,.06);
  --amber:#ffc340;
  --mono:'IBM Plex Mono',monospace;--display:'Black Han Sans',monospace;
  --r:4px;--r2:8px;
}
body{font-family:var(--mono);background:var(--ink);color:var(--body);display:flex;flex-direction:column;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.5}

/* TOPBAR */
#topbar{height:50px;background:var(--ink1);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;position:relative;z-index:100}
#topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--scarlet),var(--azure),var(--jade));opacity:.5}
.brand{font-family:var(--display);font-size:17px;letter-spacing:3px;color:var(--white);text-transform:uppercase;white-space:nowrap;line-height:1}
.brand b{color:var(--jade);font-weight:400;text-shadow:0 0 14px var(--jg)}
.sw{flex:1;max-width:500px;position:relative;margin-left:4px}
.si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;font-family:var(--mono)}
#srch{width:100%;background:var(--ink3);border:1px solid var(--line2);border-radius:var(--r);padding:7px 12px 7px 32px;color:var(--hi);font-family:var(--mono);font-size:12px;outline:none;letter-spacing:.4px;transition:border-color .18s,box-shadow .18s}
#srch:focus{border-color:var(--azure);box-shadow:0 0 0 2px rgba(61,155,255,.12),0 0 18px rgba(61,155,255,.12)}
#srch::placeholder{color:var(--muted)}
#hb{font-size:10px;color:var(--muted);letter-spacing:.5px;white-space:nowrap}
.filters{display:flex;gap:6px;margin-left:auto}
.fp{font-family:var(--display);font-size:11px;letter-spacing:2px;padding:4px 13px;border-radius:20px;border:1px solid;cursor:pointer;transition:all .14s;white-space:nowrap}
.fa{color:var(--jade);border-color:rgba(0,232,162,.25);background:var(--jd)}.fa:hover,.fa.on{background:var(--jade);color:var(--ink);box-shadow:0 0 14px var(--jg)}
.fb{color:var(--azure);border-color:rgba(61,155,255,.25);background:var(--ad)}.fb:hover,.fb.on{background:var(--azure);color:var(--ink);box-shadow:0 0 14px var(--ag)}
.fr{color:var(--scarlet);border-color:rgba(255,61,90,.25);background:var(--sd)}.fr:hover,.fr.on{background:var(--scarlet);color:var(--ink);box-shadow:0 0 14px var(--sg)}

/* LAYOUT */
#layout{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:236px;flex-shrink:0;background:var(--ink1);border-right:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column}
#sidebar::-webkit-scrollbar{width:2px}
#sidebar::-webkit-scrollbar-thumb{background:var(--line2)}
.ng{padding:14px 0 6px}
.ngt{padding:0 16px 7px;font-size:9px;letter-spacing:3.5px;display:flex;align-items:center;gap:10px}
.ngt.gb{color:var(--azure)}.ngt.gr{color:var(--scarlet)}.ngt::after{content:'';flex:1;height:1px;background:var(--line)}
.ni{display:flex;align-items:center;padding:7px 16px;gap:9px;font-size:11.5px;color:var(--muted);cursor:pointer;border-left:2px solid transparent;transition:color .1s,background .1s;letter-spacing:.2px}
.ni:hover{color:var(--hi);background:var(--ink2)}
.ni.active{color:var(--hi);background:var(--ink3);border-left-color:var(--azure)}
.ni.active.ar{border-left-color:var(--scarlet)}
.nico{font-size:14px;flex-shrink:0}
.nb{margin-left:auto;font-size:9px;background:var(--ink3);color:var(--ghost);border:1px solid var(--line);padding:1px 5px;border-radius:3px}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#crumb{height:38px;padding:0 24px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--line);background:var(--ink1);font-size:10px;color:var(--muted);letter-spacing:.5px;flex-shrink:0}
.cl{cursor:pointer;transition:color .1s}.cl:hover{color:var(--azure)}
.cs{color:var(--line2);margin:0 1px}
.cc{color:var(--body)}
#content{flex:1;overflow-y:auto;padding:24px 28px}
#content::-webkit-scrollbar{width:4px}
#content::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

/* HOME */
.hero{position:relative;padding:36px 0 30px;overflow:hidden;margin-bottom:28px;border-bottom:1px solid var(--line)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 10% 60%,rgba(61,155,255,.07) 0%,transparent 55%),radial-gradient(ellipse at 90% 60%,rgba(255,61,90,.07) 0%,transparent 55%);pointer-events:none}
.hero::after{content:'Q8';position:absolute;right:-10px;top:-14px;font-family:var(--display);font-size:160px;color:rgba(255,255,255,.022);pointer-events:none;line-height:1}
.ht{font-family:var(--display);font-size:38px;letter-spacing:4px;color:var(--white);text-transform:uppercase;line-height:1;margin-bottom:10px}
.ht em{font-style:normal;color:var(--jade);text-shadow:0 0 22px var(--jg)}
.hs{font-size:11px;color:var(--muted);line-height:1.7;letter-spacing:.4px;max-width:580px;margin-bottom:26px}
.hst{display:flex;gap:32px}
.sv{font-family:var(--display);font-size:26px;color:var(--jade);text-shadow:0 0 16px var(--jg);line-height:1}
.sl{font-size:9px;color:var(--ghost);letter-spacing:2px;margin-top:3px}
.tcards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.tc{background:var(--ink2);border:1px solid var(--line);border-radius:var(--r2);padding:22px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.tb::before{background:linear-gradient(90deg,transparent,var(--azure),transparent)}
.tr::before{background:linear-gradient(90deg,transparent,var(--scarlet),transparent)}
.tc:hover{transform:translateY(-2px)}
.tb:hover{border-color:var(--azure);box-shadow:0 8px 32px rgba(61,155,255,.14),inset 0 0 60px rgba(61,155,255,.03)}
.tr:hover{border-color:var(--scarlet);box-shadow:0 8px 32px rgba(255,61,90,.14),inset 0 0 60px rgba(255,61,90,.03)}
.tci{font-size:30px;margin-bottom:12px}
.tct{font-family:var(--display);font-size:17px;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.tb .tct{color:var(--azure)}.tr .tct{color:var(--scarlet)}
.tcd{font-size:10px;color:var(--muted);line-height:1.7;letter-spacing:.3px;margin-bottom:14px}
.tctags{display:flex;flex-wrap:wrap;gap:5px}
.ctag{font-size:9px;letter-spacing:.6px;padding:2px 7px;border-radius:2px;border:1px solid}
.tb .ctag{color:rgba(61,155,255,.75);border-color:rgba(61,155,255,.18);background:rgba(61,155,255,.04)}
.tr .ctag{color:rgba(255,61,90,.75);border-color:rgba(255,61,90,.18);background:rgba(255,61,90,.04)}
.qal{font-size:9px;letter-spacing:3px;color:var(--ghost);margin-bottom:10px}
.qag{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.qac{background:var(--ink2);border:1px solid var(--line);border-radius:var(--r);padding:14px 10px;cursor:pointer;text-align:center;transition:all .12s}
.qac:hover{border-color:var(--jade);background:rgba(0,232,162,.04)}
.qac:hover .qan{color:var(--jade)}
.qai{font-size:20px;margin-bottom:5px}
.qan{font-size:9px;color:var(--muted);letter-spacing:.5px;transition:color .12s}

/* SECTION */
.sh{display:flex;align-items:flex-start;gap:15px;padding-bottom:20px;margin-bottom:22px;border-bottom:1px solid var(--line)}
.sico{font-size:34px}
.sn{font-family:var(--display);font-size:22px;letter-spacing:2px;color:var(--white);text-transform:uppercase;margin-bottom:4px}
.sd{font-size:10px;color:var(--muted);line-height:1.65;letter-spacing:.3px}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(430px,1fr));gap:10px}

/* CMD CARD */
.cc2{background:var(--ink2);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;transition:border-color .14s,box-shadow .14s}
.cc2.cb:hover{border-color:rgba(61,155,255,.45);box-shadow:0 0 16px rgba(61,155,255,.08)}
.cc2.cr:hover{border-color:rgba(255,61,90,.45);box-shadow:0 0 16px rgba(255,61,90,.08)}
.ch{display:flex;align-items:center;padding:8px 12px;background:var(--ink3);border-bottom:1px solid var(--line);gap:8px;cursor:pointer}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.db{background:var(--azure);box-shadow:0 0 7px var(--azure)}
.dr{background:var(--scarlet);box-shadow:0 0 7px var(--scarlet)}
.clbl{font-size:11.5px;color:var(--hi);flex:1;letter-spacing:.2px;transition:color .1s}
.ch:hover .clbl{color:var(--white)}
.cpb{background:none;border:1px solid var(--line2);color:var(--ghost);font-family:var(--mono);font-size:9px;letter-spacing:1px;padding:2px 8px;border-radius:3px;cursor:pointer;transition:all .1s}
.cpb:hover{border-color:var(--jade);color:var(--jade)}
.cpb.ok{border-color:var(--jade);color:var(--jade);background:rgba(0,232,162,.07)}
.cprev{padding:10px 12px;font-size:11.5px;line-height:1.65;color:var(--jade);white-space:pre-wrap;word-break:break-all;overflow-wrap:break-word;cursor:pointer;max-height:86px;overflow:hidden;position:relative;transition:color .1s}
.cprev::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,var(--ink2));pointer-events:none}
.cprev:hover{color:var(--hi)}

/* MODAL */
#overlay{display:none;position:fixed;inset:0;background:rgba(5,6,8,.88);backdrop-filter:blur(4px);z-index:600;align-items:center;justify-content:center}
#overlay.open{display:flex}
#modal{background:var(--ink2);border:1px solid var(--line2);border-radius:var(--r2);width:min(720px,92vw);max-height:80vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 80px rgba(0,0,0,.8);animation:mp .15s ease}
@keyframes mp{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:none}}
.mt{display:flex;align-items:center;gap:10px;padding:14px 18px;background:var(--ink3);border-bottom:1px solid var(--line);flex-shrink:0}
.mti{font-size:13px;color:var(--hi);flex:1;letter-spacing:.3px}
.mteam{font-family:var(--display);font-size:10px;letter-spacing:2px;padding:2px 9px;border-radius:20px;border:1px solid}
.mb2{color:var(--azure);border-color:rgba(61,155,255,.3);background:rgba(61,155,255,.07)}
.mr2{color:var(--scarlet);border-color:rgba(255,61,90,.3);background:rgba(255,61,90,.07)}
.mx{background:none;border:1px solid var(--line2);color:var(--muted);width:27px;height:27px;border-radius:var(--r);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .1s;flex-shrink:0}
.mx:hover{border-color:var(--scarlet);color:var(--scarlet)}
.mbody{flex:1;overflow-y:auto;padding:20px;font-size:13px;line-height:1.8;color:var(--jade);white-space:pre-wrap;word-break:break-all;overflow-wrap:break-word}
.mbody::-webkit-scrollbar{width:3px}
.mbody::-webkit-scrollbar-thumb{background:var(--line2)}
.mf{padding:11px 18px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0;background:var(--ink3)}
.btn{font-family:var(--mono);font-size:10px;letter-spacing:1px;padding:7px 18px;border-radius:var(--r);cursor:pointer;border:1px solid;transition:all .12s}
.bg2{background:none;border-color:var(--line2);color:var(--muted)}.bg2:hover{border-color:var(--body);color:var(--hi)}
.bcp{background:rgba(61,155,255,.08);border-color:rgba(61,155,255,.35);color:var(--azure)}.bcp:hover{background:var(--azure);color:var(--ink);box-shadow:0 0 14px var(--ag)}
.bcp.done{background:rgba(0,232,162,.08);border-color:var(--jade);color:var(--jade)}

/* SEARCH */
.srh{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.srt{font-family:var(--display);font-size:16px;letter-spacing:1px;color:var(--hi)}
.src{font-size:9px;letter-spacing:.5px;padding:2px 8px;border-radius:10px;background:rgba(0,232,162,.08);color:var(--jade);border:1px solid rgba(0,232,162,.2)}
mark{background:rgba(255,195,64,.18);color:var(--amber);border-radius:2px;padding:0 2px}
.es{text-align:center;padding:70px 20px;color:var(--muted)}
.ei{font-size:44px;margin-bottom:16px;opacity:.5}
.em{font-size:11px;line-height:1.8;letter-spacing:.3px}

/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:var(--ink3);border:1px solid var(--jade);color:var(--jade);font-size:10px;letter-spacing:2px;padding:9px 18px;border-radius:var(--r);box-shadow:0 0 18px var(--jg);opacity:0;transform:translateY(8px);transition:all .18s;pointer-events:none;z-index:999}
#toast.show{opacity:1;transform:none}

@media(max-width:820px){
  #sidebar{width:195px}.cg{grid-template-columns:1fr}.tcards{grid-template-columns:1fr}.qag{grid-template-columns:repeat(2,1fr)}.ht{font-size:26px}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">Site<b>Q8</b> / Security</div>
  <div class="sw">
    <span class="si">⌕</span>
    <input id="srch" type="text" placeholder="Search commands, tools, techniques…  ⌘K" autocomplete="off" spellcheck="false">
  </div>
  <span id="hb"></span>
  <div class="filters">
    <div class="fp fa on" data-f="all">ALL</div>
    <div class="fp fb" data-f="blue">🔵 BLUE</div>
    <div class="fp fr" data-f="red">🔴 RED</div>
  </div>
</div>

<div id="layout">
  <nav id="sidebar"></nav>
  <div id="main">
    <div id="crumb"></div>
    <div id="content"></div>
  </div>
</div>

<div id="overlay" onclick="oc(event)">
  <div id="modal">
    <div class="mt">
      <span id="mti" class="mti"></span>
      <span id="mteam" class="mteam"></span>
      <button class="mx" onclick="cm()">✕</button>
    </div>
    <div id="mbody" class="mbody"></div>
    <div class="mf">
      <button class="btn bg2" onclick="cm()">CLOSE</button>
      <button id="mcb" class="btn bcp" onclick="cpm()">[ COPY ]</button>
    </div>
  </div>
</div>

<div id="toast">✓ COPIED</div>

<script>
const BLUE=[
{id:'bl-prep',icon:'📋',label:'Preparation',desc:'Key documents checklist, NIST CSF phases, IR planning templates',cmds:[
{t:'Key documents checklist',c:'Organization Chart\nNetwork Diagrams\nData Flow Diagrams\nCritical Asset / Data / Services List\nRules of Engagement (ROE)\nIncident Response Plan\nBusiness Continuity Plan\nDisaster Recovery Plan'},
{t:'NIST Cybersecurity Framework',c:'1. IDENTIFY  — Know assets, risks, governance\n2. PROTECT   — Implement safeguards\n3. DETECT    — Discover cybersecurity events\n4. RESPOND   — Take action on incidents\n5. RECOVER   — Restore capabilities & services'},
{t:'Incident Response phases',c:'Preparation → Identification → Containment\n→ Eradication → Recovery → Lessons Learned'},
{t:'Audit — Enable all events (Windows)',c:'auditpol /set /category:* /success:enable /failure:enable'},
{t:'Audit — Check current policy',c:'auditpol /get /category:*'},
{t:'Increase Security log to 100 MB',c:'reg add HKLM\\Software\\Policies\\Microsoft\\Windows\\Eventlog\\Security /v MaxSize /t REG_DWORD /d 0x64000'},
]},
{id:'bl-id',icon:'🔎',label:'Identify — Scanning',desc:'NMAP, Nessus, OpenVAS, Windows/Linux discovery, Active Directory enumeration, hashing',cmds:[
{t:'NMAP — Ping sweep',c:'nmap -sn -PE <IP_RANGE>'},
{t:'NMAP — Open ports only',c:'nmap --open <IP_RANGE>'},
{t:'NMAP — Service + OS detection',c:'nmap -sV -O -T4 <IP>'},
{t:'NMAP — All ports + default scripts',c:'nmap -p- -sC -sV <IP>'},
{t:'NMAP — Aggressive all-in-one',c:'nmap -A -T4 <IP>'},
{t:'NMAP — Vulnerability scripts',c:'nmap --script=vuln <IP>'},
{t:'NMAP — Save all output formats',c:'nmap -oA scan_results <IP_RANGE>'},
{t:'NMAP — Firewall evasion (fragment + decoy)',c:'nmap -f -D RND:5 <IP>'},
{t:'OpenVAS — Update NVT database',c:'openvas-nvt-sync'},
{t:'OpenVAS — Start services',c:'service openvas-scanner start && service openvas-manager start'},
{t:'Windows — Ping sweep (cmd)',c:'for /L %I in (1,1,254) do ping -w 30 -n 1 192.168.1.%I | find "Reply" >> live.txt'},
{t:'Linux — Ping sweep (bash)',c:'for ip in $(seq 1 254); do\n  ping -c1 -W1 192.168.1.$ip &>/dev/null && echo "UP: 192.168.1.$ip"\ndone'},
{t:'AD — All domain users',c:'dsquery * -filter "((objectclass=user))" -attr name samaccountname\nnet user /domain'},
{t:'AD — Admin users only',c:'dsquery * -filter "(&(objectclass=user)(admincount=1))" -attr samaccountname name'},
{t:'AD — Domain computers list',c:'dsquery computer -limit 0'},
{t:'AD — PowerShell get all users',c:'Get-ADUser -Filter * -Properties * | Select Name,SamAccountName,Enabled'},
{t:'Hash — sha256sum / md5sum (Linux)',c:'sha256sum <FILE>\nmd5sum <FILE>'},
{t:'Hash — Get-FileHash (PowerShell)',c:'Get-FileHash -Algorithm SHA256 <FILE>\nGet-FileHash -Algorithm MD5 <FILE>'},
{t:'Hash — certutil (Windows)',c:'certutil -hashfile <FILE> SHA256'},
{t:'Hash — Verify directory baseline',c:'md5deep -r /path/to/dir > baseline.md5\nmd5deep -r -x baseline.md5 /path/to/dir'},
]},
{id:'bl-protect',icon:'🛡️',label:'Protect — Hardening',desc:'IPTables, UFW, Windows Firewall, AppLocker, registry hardening, honeypots',cmds:[
{t:'IPTables — Save rules',c:'iptables-save -c > /etc/iptables/rules.v4'},
{t:'IPTables — Restore rules',c:'iptables-restore < /etc/iptables/rules.v4'},
{t:'IPTables — Block IP',c:'iptables -A INPUT -s 10.10.10.10 -j DROP'},
{t:'IPTables — Block subnet',c:'iptables -A INPUT -s 10.10.10.0/24 -j DROP'},
{t:'IPTables — Full lockdown',c:'iptables -P INPUT DROP\niptables -P OUTPUT DROP\niptables -P FORWARD DROP\niptables -F'},
{t:'IPTables — Log denied packets',c:"iptables -I INPUT 5 -m limit --limit 5/min \\\n  -j LOG --log-prefix 'denied: ' --log-level 7"},
{t:'IPTables — List rules with numbers',c:'iptables -L -v -n --line-numbers'},
{t:'UFW — Enable / status',c:'ufw enable\nufw status verbose'},
{t:'UFW — Allow / deny port',c:'ufw allow 22/tcp\nufw deny 23/tcp\nufw allow from 192.168.1.0/24 to any port 22'},
{t:'Windows FW — Enable all profiles',c:'netsh advfirewall set allprofiles state on'},
{t:'Windows FW — Block all inbound',c:'netsh advfirewall set currentprofile firewallpolicy blockinboundalways,allowoutbound'},
{t:'Windows FW — Add allow rule for app',c:'netsh advfirewall firewall add rule name="MyApp" dir=in action=allow program="C:\\App.exe" enable=yes'},
{t:'Windows FW — Show all rules',c:'netsh advfirewall firewall show rule name=all'},
{t:'Registry — Disable LM hash storage',c:'reg add HKLM\\SYSTEM\\CurrentControlSet\\Control\\Lsa /f /v NoLMHash /t REG_DWORD /d 1'},
{t:'Registry — Enforce NTLMv2 only',c:'reg add HKLM\\SYSTEM\\CurrentControlSet\\Control\\Lsa /v lmcompatibilitylevel /t REG_DWORD /d 5 /f'},
{t:'Registry — Enable UAC',c:'reg add HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System /v EnableLUA /t REG_DWORD /d 1 /f'},
{t:'Registry — Disable admin shares',c:'reg add HKLM\\System\\CurrentControlSet\\Services\\LanmanServer\\Parameters /v AutoShareWks /t REG_DWORD /d 0 /f'},
{t:'Honeypot — Linux auto-ban honey port',c:'while [ 1 ]; do\n  IP=$(nc -v -l -p 2222 2>&1 | grep from | cut -d[ -f3 | cut -d] -f1)\n  iptables -A INPUT -p tcp -s ${IP} -j DROP\n  echo "BANNED: $IP" >> /var/log/honeypot.log\ndone'},
]},
{id:'bl-detect',icon:'👁️',label:'Detect — Monitoring',desc:'TCPDump, TShark, Snort IDS, Windows/Linux log auditing, auditd, SSL checks',cmds:[

// ── STATE ──────────────────────────────────────────────────
const S={view:'home',filter:'all',q:'',mc:null};
const $=id=>document.getElementById(id);
const eh=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function hl(s,q){if(!q)return eh(s);const re=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');return eh(s).replace(re,'<mark>$1</mark>')}
function enc(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o))))}
function dec(s){return JSON.parse(decodeURIComponent(escape(atob(s))))}
function tot(){return[...BLUE,...RED].reduce((a,s)=>a+s.cmds.length,0)}
function vis(){let o=[];if(S.filter!=='red')o.push(...BLUE.map(s=>({...s,team:'blue'})));if(S.filter!=='blue')o.push(...RED.map(s=>({...s,team:'red'})));return o}

// ── SIDEBAR ────────────────────────────────────────────────
function rn(){
  let h=`<div class="ng"><div class="ni${S.view==='home'?' active':''}" onclick="go('home')"><span class="nico">⚡</span>Dashboard</div></div>
  <div class="ng"><div class="ngt gb">BLUE TEAM</div>`;
  BLUE.forEach(s=>{h+=`<div class="ni${S.view===s.id?' active':''}" onclick="go('${s.id}')"><span class="nico">${s.icon}</span>${s.label}<span class="nb">${s.cmds.length}</span></div>`});
  h+=`</div><div class="ng"><div class="ngt gr">RED TEAM</div>`;
  RED.forEach(s=>{h+=`<div class="ni${S.view===s.id?' active ar':''}" onclick="go('${s.id}')"><span class="nico">${s.icon}</span>${s.label}<span class="nb">${s.cmds.length}</span></div>`});
  h+=`</div>`;
  $('sidebar').innerHTML=h;
}

// ── CARD ───────────────────────────────────────────────────
function card(cmd,team,q=''){
  const k=eh(enc({t:cmd.t,c:cmd.c,team}));
  const dot=team==='blue'?'db':'dr';
  const cc=team==='blue'?'cb':'cr';
  const prev=cmd.c.split('\n').slice(0,3).join('\n');
  const more=cmd.c.split('\n').length>3?'\n…':'';
  return `<div class="cc2 ${cc}">
  <div class="ch" onclick="om('${k}')"><span class="dot ${dot}"></span><span class="clbl">${hl(cmd.t,q)}</span><button class="cpb" onclick="dc(event,this,${JSON.stringify(cmd.c)})">COPY</button></div>
  <div class="cprev" onclick="om('${k}')">${hl(prev+more,q)}</div>
</div>`;
}

// ── PAGES ──────────────────────────────────────────────────
function rHome(){
  const bt=BLUE.map(s=>`<span class="ctag">${s.icon} ${s.label}</span>`).join('');
  const rt=RED.map(s=>`<span class="ctag">${s.icon} ${s.label}</span>`).join('');
  const ql=[
    {i:'🔎',n:'NMAP / Scan',id:'bl-id'},{i:'💡',n:'Rev. Shells',id:'re-shells'},
    {i:'🎭',n:'Credentials',id:'re-creds'},{i:'👁️',n:'Detect/Logs',id:'bl-detect'},
    {i:'🕳️',n:'Tunneling',id:'re-tunnel'},{i:'🧬',n:'Forensics',id:'bl-forensics'},
    {i:'💣',n:'Exploitation',id:'re-exploit'},{i:'🌍',n:'Ports/Protocols',id:'re-ports'},
  ].map(x=>`<div class="qac" onclick="go('${x.id}')"><div class="qai">${x.i}</div><div class="qan">${x.n}</div></div>`).join('');
  bc([{l:'SiteQ8 Security Tools'}]);
  $('content').innerHTML=`
<div class="hero">
  <div class="ht">SiteQ8 <em>Security Tools</em></div>
  <div class="hs">Interactive offline reference for offensive and defensive security operations.<br>Browse every module, search 300+ commands, copy to clipboard instantly.</div>
  <div class="hst">
    <div><div class="sv">${tot()}</div><div class="sl">COMMANDS</div></div>
    <div><div class="sv">${BLUE.length+RED.length}</div><div class="sl">MODULES</div></div>
    <div><div class="sv">2</div><div class="sl">TEAMS</div></div>
  </div>
</div>
<div class="tcards">
  <div class="tc tb" onclick="go('bl-id')"><div class="tci">🔵</div><div class="tct">Blue Team Tools</div><div class="tcd">Defensive operations — scanning, hardening, monitoring, incident response, forensics, and recovery.</div><div class="tctags">${bt}</div></div>
  <div class="tc tr" onclick="go('re-osint')"><div class="tci">🔴</div><div class="tct">Red Team Tools</div><div class="tcd">Offensive operations — OSINT, exploitation, post-ex, credential attacks, pivoting, and scripting.</div><div class="tctags">${rt}</div></div>
</div>
<div class="qal">QUICK ACCESS</div>
<div class="qag">${ql}</div>`;
}

function rSec(id){
  const all=[...BLUE.map(s=>({...s,team:'blue'})),...RED.map(s=>({...s,team:'red'}))];
  const sec=all.find(s=>s.id===id);
  if(!sec)return;
  const tl=sec.team==='blue'?'🔵 Blue Team':'🔴 Red Team';
  bc([{l:'Home',cb:()=>go('home')},{l:tl,cb:()=>go('home')},{l:sec.label}]);
  $('content').innerHTML=`<div class="sh"><div class="sico">${sec.icon}</div><div><div class="sn">${sec.label}</div><div class="sd">${sec.desc}</div></div></div><div class="cg">${sec.cmds.map(c=>card(c,sec.team)).join('')}</div>`;
}

function rSrch(q){
  const hits=[];
  vis().forEach(sec=>sec.cmds.forEach(c=>{if((c.t+c.c).toLowerCase().includes(q.toLowerCase()))hits.push({...c,team:sec.team})}));
  $('hb').textContent=hits.length?`${hits.length} result${hits.length!==1?'s':''}` :'';
  bc([{l:'Home',cb:()=>go('home')},{l:`Search: "${q}"`}]);
  if(!hits.length){$('content').innerHTML=`<div class="es"><div class="ei">🔍</div><div class="em">No results for <strong>${eh(q)}</strong><br><br>Try: nmap · mimikatz · ssh · iptables · volatility · hydra</div></div>`;return}
  $('content').innerHTML=`<div class="srh"><div class="srt">Results</div><div class="src">${hits.length} match${hits.length!==1?'es':''}</div></div><div class="cg">${hits.map(c=>card(c,c.team,q)).join('')}</div>`;
}

// ── BREADCRUMB ─────────────────────────────────────────────
function bc(parts){
  $('crumb').innerHTML=parts.map((p,i)=>{
    const s=i>0?`<span class="cs"> › </span>`:'';
    if(i===parts.length-1||!p.cb)return`${s}<span class="cc">${eh(p.l)}</span>`;
    return`${s}<span class="cl" onclick="(${p.cb})()">${eh(p.l)}</span>`;
  }).join('');
}

// ── NAVIGATION ─────────────────────────────────────────────
function go(id){
  S.view=id;S.q='';$('srch').value='';$('hb').textContent='';$('content').scrollTop=0;
  if(id==='home')rHome();else rSec(id);
  rn();
}

// ── MODAL ──────────────────────────────────────────────────
function om(enc2){
  try{
    const d=dec(enc2);S.mc=d.c;
    $('mti').textContent=d.t;
    const t=$('mteam');
    t.textContent=d.team==='blue'?'🔵 BLUE TEAM':'🔴 RED TEAM';
    t.className='mteam '+(d.team==='blue'?'mb2':'mr2');
    $('mbody').textContent=d.c;
    const b=$('mcb');b.textContent='[ COPY ]';b.className='btn bcp';
    $('overlay').classList.add('open');
  }catch(e){console.error(e)}
}
function cm(){$('overlay').classList.remove('open');S.mc=null}
function oc(e){if(e.target===$('overlay'))cm()}
function cpm(){if(!S.mc)return;cp(S.mc);const b=$('mcb');b.textContent='✓ COPIED';b.className='btn bcp done'}

// ── COPY ───────────────────────────────────────────────────
function cp(t){
  navigator.clipboard?.writeText(t).catch(()=>{const x=document.createElement('textarea');x.value=t;document.body.appendChild(x);x.select();document.execCommand('copy');document.body.removeChild(x)});
  const toast=$('toast');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1800);
}
function dc(e,btn,raw){
  e.stopPropagation();cp(raw);btn.textContent='✓';btn.classList.add('ok');
  setTimeout(()=>{btn.textContent='COPY';btn.classList.remove('ok')},1500);
}

// ── SEARCH ─────────────────────────────────────────────────
let st;
$('srch').addEventListener('input',e=>{
  clearTimeout(st);const q=e.target.value.trim();
  st=setTimeout(()=>{
    S.q=q;
    if(!q){$('hb').textContent='';if(S.view==='search')go('home');else if(S.view!=='home')rSec(S.view);else rHome();}
    else{S.view='search';rn();rSrch(q);}
  },180);
});

// ── FILTERS ────────────────────────────────────────────────
document.querySelectorAll('.fp').forEach(p=>{
  p.addEventListener('click',()=>{
    document.querySelectorAll('.fp').forEach(x=>x.classList.remove('on'));
    p.classList.add('on');S.filter=p.dataset.f;
    if(S.q)rSrch(S.q);else if(S.view!=='home')rSec(S.view);else rHome();
  });
});

// ── KEYBOARD ───────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')cm();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();$('srch').focus();$('srch').select()}
});

// ── INIT ───────────────────────────────────────────────────
rn();rHome();
</script>
